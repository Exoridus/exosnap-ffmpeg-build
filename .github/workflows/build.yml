name: Build FFmpeg

# Trigger: manually via workflow_dispatch (choose any ffmpeg_ref),
# or automatically on r* tag pushes (uses the default ref).
on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: >
          FFmpeg upstream git ref to build (branch, tag, or commit SHA).
          Example: n8.1.1
        required: false
        default: "n8.1.1"
  push:
    tags:
      - "r*"

# ---------------------------------------------------------------------------
# Derived values shared across steps
# ---------------------------------------------------------------------------
env:
  # Canonical upstream ref: prefer the workflow_dispatch input; fall back to
  # the default when triggered by a tag push.
  FFMPEG_REF: ${{ github.event.inputs.ffmpeg_ref || 'n8.1.1' }}

  # Cross-compilation prefix
  CROSS_PREFIX: x86_64-w64-mingw32-

  # Archive stem name (version is embedded inside the archive directory)
  ARCHIVE_STEM: ffmpeg-win64-lgpl-shared

  # Installation prefix inside the build tree
  INSTALL_PREFIX: /tmp/ffmpeg-install

jobs:
  build:
    name: Build FFmpeg ${{ github.event.inputs.ffmpeg_ref || 'n8.1.1' }} (mingw-w64 cross)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      # -----------------------------------------------------------------------
      # 1. Install cross toolchain and build tools
      # -----------------------------------------------------------------------
      - name: Install mingw-w64 cross toolchain and build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            llvm \
            nasm \
            yasm \
            pkg-config \
            cmake \
            make \
            git \
            zip \
            unzip
          echo "Toolchain versions:"
          x86_64-w64-mingw32-gcc --version
          nasm --version
          # llvm-dlltool may ship with a version suffix on Ubuntu
          DLLTOOL=$(command -v llvm-dlltool 2>/dev/null || \
                    ls /usr/bin/llvm-dlltool-* 2>/dev/null | sort -V | tail -1 || true)
          echo "llvm-dlltool: ${DLLTOOL}"
          [ -n "${DLLTOOL}" ] && "${DLLTOOL}" --version || echo "llvm-dlltool not found in PATH"

      # -----------------------------------------------------------------------
      # 2. Clone FFmpeg at the pinned ref (shallow)
      # -----------------------------------------------------------------------
      - name: Clone FFmpeg at ${{ env.FFMPEG_REF }}
        run: |
          git clone --depth=1 --branch "${FFMPEG_REF}" \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          COMMIT=$(git -C ffmpeg-src rev-parse HEAD)
          echo "FFMPEG_COMMIT=${COMMIT}" >> "$GITHUB_ENV"
          echo "Cloned FFmpeg commit: ${COMMIT}"

      # -----------------------------------------------------------------------
      # 2b. Cross-compile libx264 (static) -- GPL-2.0-or-later, external to
      # FFmpeg. x264 has no numbered release tags; pin by capturing the
      # resolved commit on the `stable` branch (mirrors the FFMPEG_COMMIT
      # capture above) so the build stays fully auditable without a version
      # tag to point at.
      # -----------------------------------------------------------------------
      - name: Clone and cross-compile libx264
        run: |
          git clone --depth=1 --branch stable https://code.videolan.org/videolan/x264.git x264-src
          X264_COMMIT=$(git -C x264-src rev-parse HEAD)
          echo "X264_COMMIT=${X264_COMMIT}" >> "$GITHUB_ENV"
          echo "Cloned x264 stable @ ${X264_COMMIT}"

          cd x264-src
          ./configure \
            --host=x86_64-w64-mingw32 \
            --cross-prefix=${CROSS_PREFIX} \
            --prefix=/tmp/x264-install \
            --enable-static \
            --disable-cli \
            --disable-opencl \
            --enable-pic
          make -j$(nproc)
          make install
          echo "--- libx264 install ---"
          ls -la /tmp/x264-install/lib /tmp/x264-install/lib/pkgconfig

      # -----------------------------------------------------------------------
      # 2c. Cross-compile libx265 (static, 8-bit only) -- GPL-2.0-or-later,
      # external to FFmpeg. 10/12-bit ("main10"/"main12") multilib is
      # deliberately not built -- ExoSnap has no current use for higher
      # bit-depth software HEVC; extend later if that changes (YAGNI).
      # -----------------------------------------------------------------------
      - name: Clone and cross-compile libx265
        run: |
          git clone --depth=1 https://github.com/videolan/x265.git x265-src
          X265_COMMIT=$(git -C x265-src rev-parse HEAD)
          echo "X265_COMMIT=${X265_COMMIT}" >> "$GITHUB_ENV"
          echo "Cloned x265 default branch @ ${X265_COMMIT}"

          # x265's source/CMakeLists.txt embeds a build-version string derived
          # from `git describe --tags` (cmake/Version.cmake), gated on
          # CMAKE_RC_COMPILER being set -- which CMake auto-populates for any
          # Windows-GNU cross target regardless of the toolchain file, even
          # though we never enable the RC language (ENABLE_CLI=OFF,
          # ENABLE_SHARED=OFF mean nothing ever consumes the .rc resource).
          # Our --depth=1 clone has no reachable tags, so `git describe --tags`
          # returns empty and CMakeLists.txt's `list(GET VERSION_LIST 0/1 ...)`
          # crashes with "list GET given empty list". Seed a lightweight tag at
          # HEAD so `git describe --tags` has something to resolve; the tag
          # name itself is never consumed by ExoSnap.
          git -C x265-src tag v0.0

          cat > /tmp/toolchain-mingw64.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

          mkdir x265-cmake-build
          cd x265-cmake-build
          cmake ../x265-src/source \
            -G "Unix Makefiles" \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/tmp/x265-install \
            -DENABLE_SHARED=OFF \
            -DENABLE_CLI=OFF \
            -DENABLE_LIBNUMA=OFF \
            -DHIGH_BIT_DEPTH=OFF \
            -DMAIN12=OFF \
            -DENABLE_ASSEMBLY=ON
          make -j$(nproc)
          make install
          echo "--- libx265 install ---"
          ls -la /tmp/x265-install/lib /tmp/x265-install/lib/pkgconfig

      # -----------------------------------------------------------------------
      # 3. Configure — minimal LGPL shared, mux-only component whitelist
      #
      # Components included (derived from ExoSnap's mp4_remuxer.cpp and
      # cmake/VendorFFmpeg.cmake):
      #   Libraries:  avformat, avcodec, avutil, swresample
      #   Demuxers:   mov (MP4/MOV input), matroska (MKV/WebM input)
      #   Muxers:     mp4, mov (MP4 faststart), matroska (recovery MKV), webm
      #   Protocols:  file
      #   Parsers:    h264, hevc, av1, aac, opus, vorbis, mpegaudio
      #   Decoders:   h264, hevc, av1, opus, aac, flac,
      #               pcm_s16le, pcm_s24le, pcm_s32le, pcm_f32le
      #   Encoders:   aac (AAC-LC — ExoSnap FfmpegAacEncoder, ADR 0052)
      #   BSFs:       aac_adtstoasc, extract_extradata,
      #               h264_mp4toannexb, hevc_mp4toannexb, av1_metadata, null
      #
      # r2 adds --enable-muxer=mp4: avformat_alloc_output_context2("mp4", …)
      # requires the "mp4" muxer registration; "mov" alone is insufficient even
      # though both share the movenc backend.
      # r3 adds --enable-demuxer=mov: reading back the generated MP4 in tests
      # (avformat_open_input on .mp4 output) requires the mov/mp4 demuxer.
      # r3 -> r4: added --enable-decoder=* for h264/hevc/av1/opus/aac/flac/pcm_* --
      # the Edit-page video player needs to decode every codec ExoSnap itself can
      # produce. Previously avcodec carried zero decoders (mux/demux-only build).
      # r4 -> r5: added --enable-encoder=aac. Through r4 the avcodec DLL carried
      # zero *encoders* (--disable-everything drops them and no --enable-encoder
      # was ever set), so avcodec_find_encoder(AV_CODEC_ID_AAC) returned NULL at
      # runtime. ExoSnap is migrating its AAC path off the statically-linked
      # FDK-AAC library (ADR 0043) onto FFmpeg's native AAC-LC encoder
      # (FfmpegAacEncoder, ExoSnap ADR 0052), which needs this encoder compiled
      # in. Deliberately NO --enable-muxer=adts: ExoSnap packages AAC as raw AAC
      # access units plus AudioSpecificConfig extradata (A_AAC CodecPrivate in
      # Matroska; codecpar extradata carried through the MP4 remux), never as an
      # ADTS bitstream, so the encoder's default raw output already matches the
      # container writers with no ADTS framing required.
      # r5 -> r6: added --enable-gpl --enable-libx264 --enable-encoder=libx264
      # (cross-compiled as a static lib in the step above). This moves the
      # artifact's license from LGPL-2.1-or-later to GPL-2.0-or-later --
      # confirmed acceptable (ExoSnap itself is GPL-3.0-or-later). No release
      # ships an X264VideoEncoder yet (ADR 0007's license/patent audit gate
      # is a separate, not-yet-done step) -- this only makes the capability
      # available in the vendored binary.
      # Also added --pkg-config=pkg-config: FFmpeg's configure prefixes its
      # pkg-config default with --cross-prefix when cross-compiling (so it
      # defaults to x86_64-w64-mingw32-pkg-config), but the mingw-w64 apt
      # packages installed above don't ship such a wrapper binary. Without
      # this override, configure silently falls back to pkg_config=false and
      # every require_pkg_config check (including x264's) fails with
      # "ERROR: x264 not found using pkg-config" even though PKG_CONFIG_PATH
      # and x264.pc are both correct -- force the native, non-prefixed
      # pkg-config, which honors PKG_CONFIG_PATH fine on its own.
      # Also added --enable-libx265 --enable-encoder=libx265 (cross-compiled,
      # 8-bit only) in the same pass, plus -lstdc++ in --extra-libs since x265
      # is C++ and its static archive is linked into avcodec's C link step.
      # -----------------------------------------------------------------------
      - name: Configure FFmpeg
        env:
          PKG_CONFIG_PATH: /tmp/x264-install/lib/pkgconfig:/tmp/x265-install/lib/pkgconfig
        working-directory: ffmpeg-src
        run: |
          CONFIGURE_FLAGS=(
            --arch=x86_64
            --target-os=mingw32
            --cross-prefix=${CROSS_PREFIX}
            --pkg-config=pkg-config
            --enable-shared
            --disable-static
            --prefix=${INSTALL_PREFIX}
            --disable-everything
            --enable-avformat
            --enable-avcodec
            --enable-avutil
            --enable-swresample
            --disable-programs
            --disable-ffmpeg
            --disable-ffplay
            --disable-ffprobe
            --disable-doc
            --disable-htmlpages
            --disable-manpages
            --disable-podpages
            --disable-txtpages
            --enable-demuxer=mov
            --enable-demuxer=matroska
            --enable-muxer=mp4
            --enable-muxer=mov
            --enable-muxer=matroska
            --enable-muxer=webm
            --enable-protocol=file
            --enable-parser=h264
            --enable-parser=hevc
            --enable-parser=av1
            --enable-parser=aac
            --enable-parser=opus
            --enable-parser=vorbis
            --enable-parser=mpegaudio
            --enable-decoder=h264
            --enable-decoder=hevc
            --enable-decoder=av1
            --enable-decoder=opus
            --enable-decoder=aac
            --enable-decoder=flac
            --enable-decoder=pcm_s16le
            --enable-decoder=pcm_s24le
            --enable-decoder=pcm_s32le
            --enable-decoder=pcm_f32le
            --enable-encoder=aac
            --enable-gpl
            --enable-libx264
            --enable-encoder=libx264
            --enable-libx265
            --enable-encoder=libx265
            --extra-cflags="-I/tmp/x264-install/include -I/tmp/x265-install/include"
            --extra-ldflags="-L/tmp/x264-install/lib -L/tmp/x265-install/lib"
            --extra-libs="-lstdc++"
            --enable-bsf=aac_adtstoasc
            --enable-bsf=extract_extradata
            --enable-bsf=h264_mp4toannexb
            --enable-bsf=hevc_mp4toannexb
            --enable-bsf=av1_metadata
            --enable-bsf=null
            --enable-w32threads
            --disable-pthreads
            --disable-os2threads
            --disable-debug
            --disable-stripping
            --enable-optimizations
          )

          # Log the configure line for auditing (single line for BUILD-INFO.txt)
          CONFIGURE_LINE="./configure ${CONFIGURE_FLAGS[*]}"
          echo "Running: ${CONFIGURE_LINE}"
          # Store for BUILD-INFO.txt (escape newlines)
          printf '%s' "${CONFIGURE_LINE}" > /tmp/configure_cmd.txt

          ./configure "${CONFIGURE_FLAGS[@]}"

      # -----------------------------------------------------------------------
      # 4. Build
      # -----------------------------------------------------------------------
      - name: Build FFmpeg
        working-directory: ffmpeg-src
        run: make -j$(nproc)

      # -----------------------------------------------------------------------
      # 5. Install into staging prefix
      # -----------------------------------------------------------------------
      - name: Install FFmpeg into staging prefix
        working-directory: ffmpeg-src
        run: |
          make install
          echo "--- Installed files ---"
          find "${INSTALL_PREFIX}" -type f | sort

      # -----------------------------------------------------------------------
      # 6. Generate MSVC-compatible import libraries with llvm-dlltool
      #
      # The mingw cross build produces libXXX.dll.a (GNU import libs). ExoSnap's
      # cmake/VendorFFmpeg.cmake uses IMPORTED_IMPLIB pointing at MSVC-style
      # XXX.lib files (matching BtbN archive layout). We generate them from
      # the .def files produced by FFmpeg's build system (ffbuild/config.mak
      # lists them; they are written to the lib/ subdir of the build tree, not
      # the install prefix). If not found, generate .def via objdump.
      # -----------------------------------------------------------------------
      - name: Generate MSVC import libs (llvm-dlltool)
        working-directory: ffmpeg-src
        run: |
          BINDIR="${INSTALL_PREFIX}/bin"
          LIBDIR="${INSTALL_PREFIX}/lib"
          BUILD_LIBDIR="$(pwd)"   # .def files live in the build tree root subfolders

          # Resolve llvm-dlltool
          DLLTOOL=$(command -v llvm-dlltool 2>/dev/null || \
                    ls /usr/bin/llvm-dlltool-* 2>/dev/null | sort -V | tail -1)
          echo "Using dlltool: ${DLLTOOL}"
          if [ -z "${DLLTOOL}" ]; then
            echo "ERROR: llvm-dlltool not found" >&2
            exit 1
          fi

          for DLL in "${BINDIR}"/*.dll; do
            BASE=$(basename "${DLL}" .dll)
            # Strip version number suffix: avformat-62 -> avformat
            LIBNAME=$(echo "${BASE}" | sed 's/-[0-9]*$//')
            LIB_OUT="${LIBDIR}/${LIBNAME}.lib"

            # Look for .def in the build tree (FFmpeg writes lib<name>-<ver>.def)
            DEF_FILE=$(ls "${BUILD_LIBDIR}"/${LIBNAME}/${LIBNAME}-*.def \
                          "${BUILD_LIBDIR}"/lib${LIBNAME}/${LIBNAME}-*.def \
                          "${BUILD_LIBDIR}"/lib${LIBNAME}.def \
                          "${BUILD_LIBDIR}"/${LIBNAME}.def \
                          2>/dev/null | head -1)

            if [ -z "${DEF_FILE}" ]; then
              echo "No .def found for ${LIBNAME}; generating from DLL exports via objdump"
              DEF_FILE="/tmp/${LIBNAME}.def"
              # Use nm to get exported symbols, then format as EXPORTS section
              x86_64-w64-mingw32-nm --defined-only --extern-only "${DLL}" \
                | awk '/[0-9a-f]+ T /{print $3}' \
                | sort -u \
                > /tmp/${LIBNAME}_exports.txt
              {
                echo "LIBRARY ${BASE}.dll"
                echo "EXPORTS"
                cat /tmp/${LIBNAME}_exports.txt
              } > "${DEF_FILE}"
              wc -l < /tmp/${LIBNAME}_exports.txt
              echo "Generated .def with $(wc -l < /tmp/${LIBNAME}_exports.txt) exports"
            else
              echo "Using existing .def: ${DEF_FILE}"
            fi

            echo "Generating ${LIB_OUT} from ${BASE}.dll"
            # llvm-dlltool uses GNU-dlltool-compatible --machine strings.
            # "i386:x86-64" is the standard BFD name for x86_64 Windows.
            "${DLLTOOL}" \
              --input-def "${DEF_FILE}" \
              --dllname "${BASE}.dll" \
              --output-lib "${LIB_OUT}" \
              --machine i386:x86-64
            ls -la "${LIB_OUT}"
          done

          echo "--- Generated import libs ---"
          ls -la "${LIBDIR}"/*.lib 2>/dev/null || echo "(none)"

      # -----------------------------------------------------------------------
      # 7. Assemble the release archive in BtbN-compatible layout
      # -----------------------------------------------------------------------
      - name: Assemble release archive
        run: |
          STAGING="/tmp/ffmpeg-staging"
          ARCHIVE_DIR="${STAGING}/ffmpeg-${FFMPEG_REF}-win64-lgpl-shared"
          mkdir -p "${ARCHIVE_DIR}/bin" "${ARCHIVE_DIR}/include" "${ARCHIVE_DIR}/lib"

          # DLLs — mux-only set (avformat, avcodec, avutil, swresample)
          for LIB in avformat avcodec avutil swresample; do
            DLL=$(ls "${INSTALL_PREFIX}/bin/${LIB}"-*.dll 2>/dev/null | head -1)
            if [ -n "${DLL}" ]; then
              cp "${DLL}" "${ARCHIVE_DIR}/bin/"
              echo "Copied DLL: $(basename "${DLL}")"
            else
              echo "ERROR: DLL not found for ${LIB}" >&2
              exit 1
            fi
          done

          # Import libs
          for LIB in avformat avcodec avutil swresample; do
            LIBFILE="${INSTALL_PREFIX}/lib/${LIB}.lib"
            if [ -f "${LIBFILE}" ]; then
              cp "${LIBFILE}" "${ARCHIVE_DIR}/lib/"
              echo "Copied lib: $(basename "${LIBFILE}")"
            else
              echo "ERROR: import lib not found: ${LIBFILE}" >&2
              exit 1
            fi
          done

          # Headers — only the four ExoSnap-used library subdirs
          for INC in libavformat libavcodec libavutil libswresample; do
            SRC="${INSTALL_PREFIX}/include/${INC}"
            if [ -d "${SRC}" ]; then
              cp -r "${SRC}" "${ARCHIVE_DIR}/include/"
            else
              echo "WARNING: header dir not found: ${SRC}" >&2
            fi
          done

          # FFmpeg LGPL license
          cp ffmpeg-src/COPYING.LGPLv2.1 "${ARCHIVE_DIR}/LICENSE.md"

          # Build metadata
          TOOLCHAIN_VER=$(x86_64-w64-mingw32-gcc --version | head -1)
          CONFIGURE_CMD=$(cat /tmp/configure_cmd.txt)
          {
            printf 'FFmpeg upstream ref:  %s\n' "${FFMPEG_REF}"
            printf 'FFmpeg commit:        %s\n' "${FFMPEG_COMMIT}"
            printf 'x264 commit:          %s\n' "${X264_COMMIT}"
            printf 'x265 commit:          %s\n' "${X265_COMMIT}"
            printf 'Build date:           %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'Target:               x86_64-w64-mingw32 (Windows x86-64)\n'
            printf 'Build host:           %s\n' "$(uname -srm)"
            printf 'Toolchain:            %s\n' "${TOOLCHAIN_VER}"
            printf 'Configure command:    %s\n' "${CONFIGURE_CMD}"
            printf 'Build type:           LGPL-2.1+ shared, --disable-everything whitelist\n'
            printf 'Produced by:          https://github.com/Exoridus/exosnap-ffmpeg-build\n'
          } > "${ARCHIVE_DIR}/BUILD-INFO.txt"

          echo "--- Archive directory contents ---"
          find "${ARCHIVE_DIR}" -type f | sort

          # Create ZIP
          ARCHIVE_NAME="${ARCHIVE_STEM}.zip"
          cd "${STAGING}"
          zip -r "/tmp/${ARCHIVE_NAME}" "ffmpeg-${FFMPEG_REF}-win64-lgpl-shared/"
          echo "ARCHIVE_PATH=/tmp/${ARCHIVE_NAME}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

          echo "--- Archive listing ---"
          unzip -l "/tmp/${ARCHIVE_NAME}"

      # -----------------------------------------------------------------------
      # 8. Compute SHA256
      # -----------------------------------------------------------------------
      - name: Compute SHA256
        run: |
          SHA256=$(sha256sum "${ARCHIVE_PATH}" | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "SHA256 of ${ARCHIVE_NAME}: ${SHA256}"
          printf '%s  %s\n' "${SHA256}" "${ARCHIVE_NAME}" > /tmp/SHA256SUMS.txt
          echo "SUMS_PATH=/tmp/SHA256SUMS.txt" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 9. Upload archive as workflow artifact (always — for manual inspection)
      # -----------------------------------------------------------------------
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_STEM }}-${{ env.FFMPEG_REF }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.SUMS_PATH }}
          retention-days: 30

      # -----------------------------------------------------------------------
      # 10. Create GitHub Release (only on r* tag pushes)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/r')
        uses: softprops/action-gh-release@v2
        with:
          name: "FFmpeg ${{ env.FFMPEG_REF }} (${{ github.ref_name }})"
          body: |
            ## FFmpeg ${{ env.FFMPEG_REF }} — minimal LGPL shared build for ExoSnap

            **Upstream commit:** `${{ env.FFMPEG_COMMIT }}`
            **Build type:** LGPL-2.1+ shared (no GPL, no nonfree, `--disable-everything` whitelist)
            **Target:** Windows x86-64 (mingw-w64 cross build on ubuntu-latest)

            ### Components included
            Libraries: `avformat`, `avcodec`, `avutil`, `swresample`
            Demuxers: `mov` (MP4/MOV input), `matroska` (MKV/WebM input)
            Muxers: `mp4`, `mov` (MP4 faststart), `matroska` (MKV), `webm`
            Protocols: `file`
            Parsers: `h264`, `hevc`, `av1`, `aac`, `opus`, `vorbis`, `mpegaudio`
            Decoders: `h264`, `hevc`, `av1`, `opus`, `aac`, `flac`, `pcm_s16le`, `pcm_s24le`, `pcm_s32le`, `pcm_f32le`
            Encoders: `aac` (AAC-LC — ExoSnap's native-AAC migration, ADR 0052)
            BSFs: `aac_adtstoasc`, `extract_extradata`, `h264_mp4toannexb`, `hevc_mp4toannexb`, `av1_metadata`, `null`

            ### SHA256
            ```
            ${{ env.SHA256 }}  ${{ env.ARCHIVE_NAME }}
            ```

            ### ExoSnap CMake update
            In `cmake/VendorFFmpeg.cmake`, replace the `FetchContent_Declare` block:
            ```cmake
            FetchContent_Declare(
                ffmpeg_prebuilt
                URL      "https://github.com/Exoridus/exosnap-ffmpeg-build/releases/download/${{ github.ref_name }}/${{ env.ARCHIVE_NAME }}"
                URL_HASH "SHA256=${{ env.SHA256 }}"
                DOWNLOAD_EXTRACT_TIMESTAMP TRUE
            )
            ```

            ### LGPL §4 compliance
            FFmpeg source at pinned tag: https://github.com/FFmpeg/FFmpeg/tree/${{ env.FFMPEG_REF }}
            Configure flags are in `BUILD-INFO.txt` inside the archive. No patches applied.
          files: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.SUMS_PATH }}
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
